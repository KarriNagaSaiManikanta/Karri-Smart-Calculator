  <body>
    <header class="head">
      <div class="title">
        <h1>Make Your Calculations Easy</h1>
      </div>
    </header>
    <section>
        <div class="main">
            <div class="numbers">
             <div class="numbers2">
<h1 id="enter">0</h1>
             </div>
        </div>
      <div class="container">
        <div class="num">
          <button onclick="cal(7)"><h1>7</h1></button>
        </div>
        <div class="num">
          <button onclick="cal(8)"><h1>8</h1></button>
        </div>

        <div class="num">
          <button onclick="cal(9)"><h1>9</h1></button>
        </div>
        <div class="num">
          <button onclick="cal('×')"><h1>×</h1></button>
        </div>
        <div class="num">
          <button onclick="clearAll()"><h1>c</h1></button>
        </div>

        <div class="num">
          <button onclick="cal(4)"><h1>4</h1></button>
        </div>
        <div class="num">
          <button onclick="cal(5)"><h1>5</h1></button>
        </div>
        <div class="num">
          <button onclick="cal(6)"><h1>6</h1></button>
        </div>
        <div class="num">
          <button onclick="cal('-')"><h1>-</h1></button>
        </div>
        <div class="num">
          <button onclick="del()"><h1>Del</h1></button>
        </div>

        <div class="num">
          <button onclick="cal(1)"><h1>1</h1></button>
        </div>
        <div class="num">
          <button onclick="cal(2)"><h1>2</h1></button>
        </div>
        <div class="num">
          <button onclick="cal(3)"><h1>3</h1></button>
        </div>
        <div class="num">
          <button onclick="cal('+')"><h1>+</h1></button>
        </div>
       <div class="num equal">
  <button onclick="result()"><h1>=</h1></button>
</div>

        <div class="num num0">
          <button onclick="cal(0)"><h1>0</h1></button>
        </div>
        <div class="num">
          <button onclick="cal('.')" id="point"><h1>.</h1></button>
        </div>
        <div class="num">
          <button onclick="cal('/')" id="divide"><h1>÷</h1></button>
        </div>
      </div>
        </div>
    </section>
    <script>
      let display = '';

function cal(value) {

  // multiply symbol fix
  if (value === '×') {
    value = '*';
  }

  // divide symbol optional fix
  if (value === '÷') {
    value = '/';
  }

  display += value;

  document.getElementById('enter').innerHTML = display;
}

function result() {
  try {
    display = eval(display); // calculate result safely
    document.getElementById('enter').innerHTML = display;
  } catch (error) {
    document.getElementById('enter').innerHTML = "Error";
    display = '';
  }
}

function del() {
  display = display.slice(0, -1);

  document.getElementById('enter').innerHTML =
    display === '' ? '0' : display;
}

function clearAll() {
  display = '';
  document.getElementById('enter').innerHTML = '0';
}
        
        
         
          
        
    </script>
  </body>
